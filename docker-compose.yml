services:
  kafka:
    image: apache/kafka:3.9.1
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: CONTROLLER://0.0.0.0:9091,DOCKER://0.0.0.0:9092,HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: DOCKER://kafka:9092,HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,DOCKER:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9091
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_NUM_PARTITIONS: "1"
    ports:
      - "29092:29092"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-citybike}
      POSTGRES_USER: ${POSTGRES_USER:-citybike}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-citybike}
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./storage/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

  spark-master:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    restart: unless-stopped
    depends_on:
      - kafka
      - postgres
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: ${KAFKA_TOPIC:-bike-stations}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-citybike}
      POSTGRES_USER: ${POSTGRES_USER:-citybike}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-citybike}
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_APP_NAME: ${SPARK_APP_NAME:-citybike-stream-analytics}
      SPARK_CHECKPOINT_DIR: /opt/project/data/checkpoints/citybike_stream
      PARQUET_OUTPUT_PATH: /opt/project/data/parquet/station_status
      LOW_AVAILABILITY_THRESHOLD: ${LOW_AVAILABILITY_THRESHOLD:-2}
      CRITICAL_BIKES_THRESHOLD: ${CRITICAL_BIKES_THRESHOLD:-2}
      CRITICAL_UTILIZATION_THRESHOLD: ${CRITICAL_UTILIZATION_THRESHOLD:-0.85}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-60}
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ./:/opt/project

  spark-worker:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    restart: unless-stopped
    depends_on:
      - spark-master
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --webui-port
      - "8081"
      - --cores
      - "2"
      - --memory
      - 2G
    ports:
      - "8081:8081"
    volumes:
      - ./:/opt/project

volumes:
  postgres_data:
