services:
  zookeeper:
    image: bitnami/zookeeper:3.9
    restart: unless-stopped
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    ports:
      - "2181:2181"

  kafka:
    image: bitnami/kafka:3.7
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: "1"
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:29092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
    ports:
      - "29092:29092"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-citybike}
      POSTGRES_USER: ${POSTGRES_USER:-citybike}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-citybike}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./storage/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

  spark-master:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    restart: unless-stopped
    depends_on:
      - kafka
      - postgres
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: "7077"
      SPARK_MASTER_WEBUI_PORT: "8080"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: ${KAFKA_TOPIC:-bike-stations}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-citybike}
      POSTGRES_USER: ${POSTGRES_USER:-citybike}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-citybike}
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_APP_NAME: ${SPARK_APP_NAME:-citybike-stream-analytics}
      SPARK_CHECKPOINT_DIR: /opt/project/data/checkpoints/citybike_stream
      PARQUET_OUTPUT_PATH: /opt/project/data/parquet/station_status
      LOW_AVAILABILITY_THRESHOLD: ${LOW_AVAILABILITY_THRESHOLD:-2}
      CRITICAL_BIKES_THRESHOLD: ${CRITICAL_BIKES_THRESHOLD:-2}
      CRITICAL_UTILIZATION_THRESHOLD: ${CRITICAL_UTILIZATION_THRESHOLD:-0.85}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-60}
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ./:/opt/project

  spark-worker:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    restart: unless-stopped
    depends_on:
      - spark-master
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_CORES: "2"
      SPARK_WORKER_MEMORY: 2G
    ports:
      - "8081:8081"
    volumes:
      - ./:/opt/project

volumes:
  postgres_data:
